kind = "web"
previewPath = "/"
title = "Apple Cash Lander"
version = "1.0.0"
id = "artifacts/lander"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18566

[services.development]
run = "pnpm --filter @workspace/lander run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lander", "run", "build" ]
publicDir = "artifacts/lander/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18566"
BASE_PATH = "/"
